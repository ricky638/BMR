<!DOCTYPE html>
<html>
<head>
    <title>S3 Upload Test</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #111;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrapper {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 16px;
            padding: 24px 28px 28px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
            max-width: 420px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.4rem;
            letter-spacing: 0.03em;
        }

        p#status {
            font-size: 0.9rem;
            margin-top: 10px;
            min-height: 1.2em;
        }

        input[type="file"] {
            display: block;
            margin: 10px 0 14px;
        }

        button {
            background: #ff8a3c;
            border: none;
            color: #1b120b;
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
        }

        button:hover {
            background: #ff9f5f;
        }

        #preview {
            max-width: 100%;
            margin-top: 18px;
            display: none;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 4px;
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>Upload a File</h2>

        <input type="file" id="fileInput" />
        <button onclick="uploadFile()">Upload</button>

        <p id="status"></p>

        <img id="preview">
    </div>

    <script>
        async function uploadFile() {
            const file = document.getElementById("fileInput").files[0];
            if (!file) {
                document.getElementById("status").innerText = "No file selected.";
                return;
            }

            document.getElementById("status").innerText = "Requesting upload URL...";

            const apiUrl = "https://l4k0wr83ee.execute-api.us-west-2.amazonaws.com/prod/presign";

            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ filename: file.name, contentType: file.type })
                });

                if (!response.ok) {
                    document.getElementById("status").innerText = "Error getting presigned URL.";
                    return;
                }

                const data = await response.json();
                const uploadUrl = data.url;

                document.getElementById("status").innerText = "Uploading to S3...";

                const upload = await fetch(uploadUrl, {
                    method: "PUT",
                    headers: { 
                        "Content-Type": file.type,
                        "x-amz-server-side-encryption": "AES256"
                    },
                    body: file
                });

                if (upload.ok) {
                    document.getElementById("status").innerText = "Upload complete!";

                    const preview = document.getElementById("preview");
                    const cleanUrl = uploadUrl.split("?")[0];

                    preview.src = cleanUrl;
                    preview.style.display = "block";
                } else {
                    document.getElementById("status").innerText = "Upload failed.";
                }
            } catch (err) {
                document.getElementById("status").innerText = "An error occurred.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
